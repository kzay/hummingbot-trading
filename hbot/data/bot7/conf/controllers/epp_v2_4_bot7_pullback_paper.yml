# Bot7 - Trend-aligned Pullback Grid (paper engine)
# Enters WITH the trend on pullbacks to BB basis.
# Only active in "up"/"down" regimes with ADX 22-40.
id: epp_v2_4_bot7_pullback_paper
controller_name: epp_v2_4_bot7_pullback
controller_type: directional

connector_name: bitget_perpetual
connector_type: perp
trading_pair: BTC-USDT

total_amount_quote: 800
buy_spreads: "0.0015,0.0030,0.0045"
sell_spreads: "0.0015,0.0030,0.0045"
buy_amounts_pct: "34,33,33"
sell_amounts_pct: "34,33,33"
executor_refresh_time: 120
cooldown_time: 30
leverage: 1
position_mode: ONEWAY
max_order_notional_quote: 400
stop_loss: 0.0045
take_profit: 0.0090
time_limit: 7200
take_profit_order_type: LIMIT
skip_rebalance: true
position_rebalance_min_base_mult: 5.0
ghost_position_guard_enabled: true

variant: a
enabled: true
no_trade: false
instance_name: bot7
log_dir: /home/hummingbot/logs

fee_mode: manual
fee_profile: vip0
require_fee_resolution: true
spot_fee_pct: 0.0002
slippage_est_pct: 0.00005
turnover_cap_x: 20.0
turnover_penalty_step: 0.0001
# MM-only params (edge gate, adaptive spreads, governor) are disabled by DirectionalRuntimeConfig
edge_state_hold_s: 75
trend_eps_pct: 0.0006
high_vol_band_pct: 0.0065
shock_drift_30s_pct: 0.0020
shock_drift_atr_multiplier: 1.10

# ── Resolution ────────────────────────────────────────────────────────
indicator_resolution: "15m"

# ── Indicators ────────────────────────────────────────────────────────
pb_bb_period: 20
pb_bb_stddev: 2.0
pb_rsi_period: 14
pb_adx_period: 14
atr_period: 14

# ── RSI entry windows (momentum dip/pop, not exhaustion) ─────────────
pb_rsi_long_min: 35
pb_rsi_long_max: 55
pb_rsi_short_min: 45
pb_rsi_short_max: 65
pb_rsi_probe_long_min: 38
pb_rsi_probe_long_max: 58
pb_rsi_probe_short_min: 42
pb_rsi_probe_short_max: 62

# ── ADX range gate (18-45: wider window for directional trend) ────────
pb_adx_min: 18
pb_adx_max: 45

# ── Pullback zone (near BB basis, above lower band) ──────────────────
# Static floor; widens to max(zone_pct, atr/mid * zone_atr_mult) in high vol.
pb_pullback_zone_pct: 0.0015
pb_band_floor_pct: 0.0010
pb_zone_atr_mult: 0.25

# ── Trade flow timing ─────────────────────────────────────────────────
pb_trade_window_count: 160
pb_trade_stale_after_ms: 30000
pb_trade_reader_enabled: true

# ── Signal windows ────────────────────────────────────────────────────
pb_absorption_window: 20
pb_absorption_min_trade_mult: 2.5
pb_absorption_max_price_drift_pct: 0.003
pb_delta_trap_window: 24
pb_delta_trap_reversal_share: 0.30
pb_delta_trap_max_price_drift_pct: 0.004
pb_recent_delta_window: 20
pb_depth_imbalance_threshold: 0.20

# ── Grid sizing ───────────────────────────────────────────────────────
pb_max_grid_legs: 3
pb_per_leg_risk_pct: 0.008
pb_total_grid_exposure_cap_pct: 0.025
pb_grid_spacing_atr_mult: 0.50
pb_grid_spacing_bb_fraction: 0.12
pb_grid_spacing_floor_pct: 0.003
pb_grid_spacing_cap_pct: 0.020

# ── Risk / hedging ────────────────────────────────────────────────────
pb_hedge_ratio: 0.30
pb_funding_long_bias_threshold: -0.0003
pb_funding_short_bias_threshold: 0.0003
pb_funding_vol_reduce_threshold: 0.0010
pb_block_contra_funding: true

# ── Probe mode ────────────────────────────────────────────────────────
pb_probe_enabled: true
pb_probe_grid_legs: 1
pb_probe_size_mult: 0.50

# ── Signal cooldown ───────────────────────────────────────────────────
pb_signal_cooldown_s: 900

# ── Warmup quotes (disabled: no fills during indicator warmup) ────────
pb_warmup_quote_levels: 0
pb_warmup_quote_max_bars: 3

# ── ATR-scaled dynamic barriers ──────────────────────────────────────
pb_dynamic_barriers_enabled: true
pb_sl_atr_mult: 1.5
pb_tp_atr_mult: 3.0
pb_sl_floor_pct: 0.005
pb_sl_cap_pct: 0.025
pb_tp_floor_pct: 0.010
pb_tp_cap_pct: 0.050

# ── Trend quality gates ──────────────────────────────────────────────
pb_trend_quality_enabled: true
pb_basis_slope_bars: 3
pb_min_basis_slope_pct: 0.0002
pb_trend_sma_period: 20

# ── Trailing stop ────────────────────────────────────────────────────
pb_trailing_stop_enabled: true
pb_trail_activate_atr_mult: 1.0
pb_trail_offset_atr_mult: 0.5

# ── Partial profit-taking ────────────────────────────────────────────
pb_partial_take_pct: 0.33

# ── Entry quality ────────────────────────────────────────────────────
pb_limit_entry_enabled: true
pb_entry_offset_pct: 0.001
pb_entry_timeout_s: 30
pb_adverse_selection_enabled: true
pb_max_entry_spread_pct: 0.0008
pb_max_entry_imbalance: 0.5

# ── Z-score absorption ──────────────────────────────────────────────
pb_absorption_zscore_enabled: true
pb_absorption_zscore_threshold: 1.5

# ── Probe SL tightening ────────────────────────────────────────────
pb_probe_sl_mult: 0.75

# ── Limit-order exits ──────────────────────────────────────────────
pb_trail_exit_order_type: "LIMIT"
pb_partial_exit_order_type: "LIMIT"
pb_exit_limit_timeout_s: 15

# ── Volume-declining pullback filter ────────────────────────────────
pb_vol_decline_enabled: true
pb_vol_decline_lookback: 5

# ── Time-of-day quality filter ──────────────────────────────────────
pb_session_filter_enabled: true
pb_quality_hours_utc: "1-4,8-16,20-23"
pb_low_quality_size_mult: 0.5

# ── Gradient trend confidence ───────────────────────────────────────
pb_trend_confidence_enabled: true
pb_trend_confidence_min_mult: 0.5

# ── RSI divergence booster ──────────────────────────────────────────
pb_rsi_divergence_enabled: true
pb_rsi_divergence_lookback: 5

# ── Signal freshness timeout ────────────────────────────────────────
pb_signal_freshness_enabled: true
pb_signal_max_age_s: 960

# ── Adaptive cooldown ──────────────────────────────────────────────
pb_adaptive_cooldown_enabled: true
pb_cooldown_min_s: 450
pb_cooldown_max_s: 1800

# ── Signal diagnostics ───────────────────────────────────────────────
pb_signal_diagnostics_enabled: true
pb_min_signals_warn: 3


# Bot7 Pullback V2 — quant-redesigned backtest configuration
# Usage: PYTHONPATH=hbot python -m controllers.backtesting.harness_cli --config data/backtest_configs/bot7_pullback_v2.yml

strategy_class: ""
strategy_config:
  adapter_mode: "pullback_v2"

  # Indicator periods
  bb_period: 20
  bb_stddev: "2.0"
  rsi_period: 14
  adx_period: 14
  atr_period: 14
  sma_fast: 20
  sma_slow: 50

  # Composite entry — fire when score >= threshold
  entry_score_threshold: "0.25"

  # Component weights (sum ~1.0)
  w_pullback_zone: "0.30"
  w_trend_slope: "0.25"
  w_rsi_zone: "0.20"
  w_adx_strength: "0.15"
  w_rsi_divergence: "0.10"

  # Pullback zone: price distance from BB basis
  pullback_depth_min_pct: "0.0002"
  pullback_depth_max_pct: "0.008"

  # RSI thresholds for pullback entries (wider to catch shallow pullbacks)
  rsi_long_max: "50"
  rsi_short_min: "50"

  # ADX trend detection
  adx_trend_min: "18"

  # Trend slope
  min_slope_pct: "0.0001"

  # RSI divergence
  divergence_lookback: 30

  # Position sizing
  base_risk_pct: "0.05"
  vol_scale_atr_target: "0.005"

  # Exit management
  sl_atr_mult: "1.2"
  tp_atr_mult: "2.5"
  partial_take_at_r: "1.0"
  partial_take_pct: "0.50"
  trail_activate_r: "1.5"
  trail_offset_atr: "0.5"

  # Time stop
  max_hold_minutes: 360

  # Cooldown
  signal_cooldown_s: 60

  # Risk limits
  max_daily_loss_pct: "0.02"
  max_drawdown_pct: "0.035"

  # Session filter
  session_filter_enabled: true
  quality_hours_utc: "1-4,8-16,20-23"
  off_session_size_mult: "0.5"

  # Warmup
  min_warmup_bars: 60

  # Regime reversal exit
  regime_reversal_exit: true

data_source:
  exchange: bitget
  pair: BTC-USDT
  resolution: 1m
  instrument_type: perp
  start_date: "2025-01-01"
  end_date: "2025-03-31"
  catalog_dir: data/historical

initial_equity: 500
fill_model: latency_aware
fill_model_preset: optimistic
seed: 42
leverage: 1
step_interval_s: 60
warmup_bars: 60

synthesis:
  base_spread_bps: 5.0
  vol_spread_mult: 1.0
  depth_levels: 5
  depth_decay: 0.70
  base_depth_size: 1.0
  steps_per_bar: 4
  seed: 42

output_dir: reports/backtest

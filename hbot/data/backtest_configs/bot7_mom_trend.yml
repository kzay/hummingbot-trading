strategy_class: ""
strategy_config:
  adapter_mode: "momentum_scalper"
  # Medium EMAs with strong trend filter
  ema_fast: 12
  ema_slow: 26
  rsi_period: 14
  atr_period: 14
  adx_period: 14
  rsi_overbought: "70"
  rsi_oversold: "30"
  # Very strong ADX filter
  adx_min: "30"
  risk_pct: "0.12"
  # Wide TP for trend-following
  sl_atr_mult: "1.0"
  tp_atr_mult: "4.0"
  trail_activate_r: "1.0"
  trail_offset_atr: "0.5"
  max_hold_minutes: 480
  cooldown_s: 900
  max_daily_loss_pct: "0.03"
  min_warmup_bars: 30

data_source:
  exchange: bitget
  pair: BTC-USDT
  resolution: 1m
  instrument_type: perp
  start_date: "2025-01-01"
  end_date: "2025-01-31"
  catalog_dir: data/historical

initial_equity: 500
fill_model: latency_aware
seed: 42
leverage: 1
step_interval_s: 60
warmup_bars: 60

synthesis:
  base_spread_bps: "5.0"
  vol_spread_mult: "1.0"
  depth_levels: 10
  depth_decay: "0.70"
  base_depth_size: "0.5"
  steps_per_bar: 4

output_dir: reports/backtest

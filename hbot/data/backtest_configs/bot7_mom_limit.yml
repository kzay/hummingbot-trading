strategy_class: ""
strategy_config:
  adapter_mode: "momentum_scalper"
  ema_fast: 20
  ema_slow: 50
  rsi_period: 14
  atr_period: 14
  adx_period: 14
  rsi_overbought: "65"
  rsi_oversold: "35"
  adx_min: "25"
  risk_pct: "0.10"
  # Wide asymmetric R:R (3:1)
  sl_atr_mult: "1.0"
  tp_atr_mult: "3.0"
  trail_activate_r: "1.5"
  trail_offset_atr: "0.5"
  max_hold_minutes: 480
  cooldown_s: 1800
  max_daily_loss_pct: "0.03"
  min_warmup_bars: 55
  # LIMIT entry for maker fees
  entry_order_type: "limit"
  limit_entry_offset_atr: "0.05"

data_source:
  exchange: bitget
  pair: BTC-USDT
  resolution: 1m
  instrument_type: perp
  start_date: "2025-01-01"
  end_date: "2025-01-31"
  catalog_dir: data/historical

initial_equity: 500
fill_model: latency_aware
seed: 42
leverage: 1
step_interval_s: 60
warmup_bars: 60

synthesis:
  base_spread_bps: "5.0"
  vol_spread_mult: "1.0"
  depth_levels: 10
  depth_decay: "0.70"
  base_depth_size: "0.5"
  steps_per_bar: 4

output_dir: reports/backtest

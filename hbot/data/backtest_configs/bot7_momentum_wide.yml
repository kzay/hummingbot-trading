strategy_class: ""
strategy_config:
  adapter_mode: "momentum_scalper"
  ema_fast: 12
  ema_slow: 34
  rsi_period: 14
  atr_period: 20
  adx_period: 14
  rsi_overbought: "75"
  rsi_oversold: "25"
  adx_min: "12"
  risk_pct: "0.08"
  sl_atr_mult: "2.0"
  tp_atr_mult: "3.0"
  trail_activate_r: "1.2"
  trail_offset_atr: "1.0"
  max_hold_minutes: 240
  cooldown_s: 600
  max_daily_loss_pct: "0.03"
  min_warmup_bars: 40

data_source:
  exchange: bitget
  pair: BTC-USDT
  resolution: 1m
  instrument_type: perp
  start_date: "2025-01-01"
  end_date: "2025-03-31"
  catalog_dir: data/historical

initial_equity: 500
fill_model: latency_aware
seed: 42
leverage: 1
step_interval_s: 60
warmup_bars: 60

synthesis:
  base_spread_bps: "5.0"
  vol_spread_mult: "1.0"
  depth_levels: 10
  depth_decay: "0.70"
  base_depth_size: "0.5"
  steps_per_bar: 4

output_dir: reports/backtest

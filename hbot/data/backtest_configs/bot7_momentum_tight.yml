strategy_class: ""
strategy_config:
  adapter_mode: "momentum_scalper"
  ema_fast: 5
  ema_slow: 13
  rsi_period: 10
  atr_period: 14
  adx_period: 14
  rsi_overbought: "68"
  rsi_oversold: "32"
  adx_min: "18"
  risk_pct: "0.15"
  sl_atr_mult: "1.0"
  tp_atr_mult: "1.5"
  trail_activate_r: "0.8"
  trail_offset_atr: "0.6"
  max_hold_minutes: 60
  cooldown_s: 180
  max_daily_loss_pct: "0.03"
  min_warmup_bars: 25

data_source:
  exchange: bitget
  pair: BTC-USDT
  resolution: 1m
  instrument_type: perp
  start_date: "2025-01-01"
  end_date: "2025-03-31"
  catalog_dir: data/historical

initial_equity: 500
fill_model: latency_aware
seed: 42
leverage: 1
step_interval_s: 60
warmup_bars: 60

synthesis:
  base_spread_bps: "5.0"
  vol_spread_mult: "1.0"
  depth_levels: 10
  depth_decay: "0.70"
  base_depth_size: "0.5"
  steps_per_bar: 4

output_dir: reports/backtest

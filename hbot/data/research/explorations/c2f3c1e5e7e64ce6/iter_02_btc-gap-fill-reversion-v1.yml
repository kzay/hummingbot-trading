name: btc-gap-fill-reversion-v1
hypothesis: BTC-USDT 1m bars exhibit gap-filling behavior when the open price differs
  significantly from the previous close (>0.8 ATR). Price tends to revert toward the
  gap within 5-15 bars, creating profitable mean-reversion opportunities with 65%+
  win rate when combined with RSI divergence confirmation.
adapter_mode: gap_reversion
parameter_space:
  gap_threshold_atr:
  - 0.6
  - 0.8
  - 1.0
  - 1.2
  rsi_period:
  - 7
  - 14
  - 21
  rsi_divergence_threshold:
  - 30
  - 35
  - 40
  max_holding_bars:
  - 5
  - 10
  - 15
  - 20
entry_logic: Enter long when current_open < previous_close - gap_threshold_atr * ATR(14)
  AND RSI(rsi_period) < rsi_divergence_threshold (oversold gap down). Enter short
  when current_open > previous_close + gap_threshold_atr * ATR(14) AND RSI(rsi_period)
  > (100 - rsi_divergence_threshold) (overbought gap up).
exit_logic: 'Target: gap fill level (previous_close). Stop: 1.5 * gap_threshold_atr
  * ATR(14) adverse move from entry. Time exit: max_holding_bars bars if neither target
  nor stop hit.'
base_config:
  strategy_class: gap_reversion
  strategy_config:
    atr_period: 14
    position_size_pct: 0.02
  data_source:
    exchange: bitget
    pair: BTC-USDT
    resolution: 1m
    instrument_type: perp
  initial_equity: '500'
  leverage: 1
  seed: 42
  step_interval_s: 60
  warmup_bars: 60
required_tests:
- test_adapter_compiles
- test_no_lookahead_in_entry
metadata:
  author: llm_exploration
  version: '1.0'
lifecycle: candidate
new_adapter_description: 'Gap reversion adapter monitors price gaps between consecutive
  bars (open vs previous close) and RSI momentum divergence. On each bar, it: (1)
  calculates gap size relative to ATR, (2) checks RSI level for divergence confirmation,
  (3) enters mean-reversion positions targeting gap fill, (4) manages positions with
  profit target at gap level, stop-loss at multiple of gap size, and time-based exit.
  Config parameters: gap_threshold_atr (float), rsi_period (int), rsi_divergence_threshold
  (float), max_holding_bars (int), position_size_pct (float), atr_period (int).'

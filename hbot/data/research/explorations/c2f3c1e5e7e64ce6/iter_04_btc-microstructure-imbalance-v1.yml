name: btc-microstructure-imbalance-v1
hypothesis: BTC-USDT 1m bars exhibit predictable short-term directional bias when
  order flow imbalance (measured via bid-ask volume delta proxy) persists across multiple
  bars. A directional market-making strategy that leans quotes in the imbalance direction
  should capture edge while providing liquidity, achieving positive PnL with Sharpe
  >0.8 over 7-day windows.
adapter_mode: flow_imbalance_mm
parameter_space:
  imbalance_lookback:
  - 3
  - 5
  - 7
  - 10
  imbalance_threshold:
  - 0.3
  - 0.5
  - 0.7
  - 1.0
  quote_skew_mult:
  - 0.2
  - 0.4
  - 0.6
  - 0.8
  inventory_decay:
  - 0.85
  - 0.9
  - 0.95
  - 0.98
entry_logic: Calculate volume-weighted price delta over imbalance_lookback bars. If
  cumulative delta > imbalance_threshold * average_volume, skew bid quotes tighter
  by quote_skew_mult * spread_width and ask quotes wider. Reverse for negative imbalance.
  Maintain symmetric quotes when imbalance below threshold.
exit_logic: Apply inventory_decay factor each bar to reduce position size toward zero.
  Force flatten if absolute inventory exceeds 3x normal quote size. Individual fills
  exit via standard market-making profit-taking at spread capture.
base_config:
  strategy_class: flow_imbalance_mm
  strategy_config:
    base_spread_bps: 8
    quote_size_usd: 25
    max_inventory_usd: 150
    tick_size_mult: 1
  data_source:
    exchange: bitget
    pair: BTC-USDT
    resolution: 1m
    instrument_type: perp
  initial_equity: '500'
  leverage: 1
  seed: 42
  step_interval_s: 60
  warmup_bars: 20
required_tests:
- test_adapter_compiles
- test_no_lookahead_in_entry
- test_inventory_management
metadata:
  author: llm_exploration
  version: '1.0'
lifecycle: candidate
new_adapter_description: 'Microstructure imbalance market maker that proxies order
  flow via volume-weighted price movements. Consumes: OHLCV bars, maintains rolling
  volume-delta calculation over configurable lookback. Processing: each bar, compute
  price*volume delta, update cumulative imbalance, determine quote skew direction.
  State: cumulative volume imbalance, current inventory position, active bid/ask quotes.
  Config parameters: imbalance_lookback (bars), imbalance_threshold (volume multiple),
  quote_skew_mult (asymmetry factor), inventory_decay (position reduction rate), base_spread_bps,
  quote_size_usd, max_inventory_usd.'

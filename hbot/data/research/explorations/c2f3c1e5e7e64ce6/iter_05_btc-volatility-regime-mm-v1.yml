name: btc-volatility-regime-mm-v1
hypothesis: BTC-USDT perpetual exhibits distinct volatility regimes measurable via  rolling
  ATR percentiles. During low-volatility regimes (ATR < 25th percentile of 100-bar
  lookback), tight market-making spreads capture more fills with higher win rates.
  During high-volatility regimes (ATR > 75th percentile), wider spreads with faster
  inventory unwind prevent adverse selection. This regime-adaptive approach should
  outperform static spread MM by 15%+ Sharpe.
adapter_mode: volatility_regime_mm
parameter_space:
  atr_lookback:
  - 50
  - 100
  - 200
  low_vol_spread_mult:
  - 0.3
  - 0.5
  - 0.8
  high_vol_spread_mult:
  - 1.5
  - 2.0
  - 3.0
  regime_threshold:
  - 20
  - 25
  - 30
entry_logic: Calculate ATR(14) percentile over atr_lookback bars. If ATR percentile
  <  regime_threshold, enter tight MM quotes at low_vol_spread_mult * ATR from mid.
  If ATR percentile > (100 - regime_threshold), enter wide MM quotes at high_vol_spread_mult
  * ATR from mid. No quotes during middle regime.
exit_logic: 'Close positions when regime changes (low->high or high->low). Within
  regime, manage inventory: if position > 50% of max size, bias quotes away from position
  direction. Emergency exit if unrealized loss > 2 * ATR.'
base_config:
  strategy_class: volatility_regime_mm
  strategy_config:
    atr_period: 14
    max_position_size: 0.1
    inventory_bias_threshold: 0.5
    emergency_loss_mult: 2.0
  data_source:
    exchange: bitget
    pair: BTC-USDT
    resolution: 1m
    instrument_type: perp
  initial_equity: '500'
  leverage: 2
  seed: 42
  step_interval_s: 60
  warmup_bars: 200
required_tests:
- test_adapter_compiles
- test_no_lookahead_in_entry
- test_regime_detection_logic
metadata:
  author: llm_exploration
  version: '1.0'
  notes: Regime-adaptive market making based on volatility percentiles
lifecycle: candidate
new_adapter_description: 'This adapter implements regime-aware market making by classifying
  market conditions into low/medium/high volatility states using ATR percentiles.

  Signals consumed: OHLCV bars, ATR(14), rolling ATR percentile over configurable
  lookback window.

  Processing logic: On each bar completion, calculate current ATR percentile. Determine
  regime (low/high/middle). In low-vol regime, place tight bid/ask quotes. In high-vol
  regime, place wide quotes. In middle regime, stay flat.

  State maintained: Current regime, position size, unrealized PnL, ATR history buffer
  for percentile calculation, pending orders.

  Config parameters: atr_period, atr_lookback (percentile window),  low_vol_spread_mult,
  high_vol_spread_mult, regime_threshold (percentile cutoff), max_position_size, inventory_bias_threshold,
  emergency_loss_mult.'

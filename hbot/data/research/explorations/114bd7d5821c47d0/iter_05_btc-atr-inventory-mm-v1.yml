name: btc-atr-inventory-mm-v1
hypothesis: BTC-USDT perpetual exhibits predictable inventory-driven price pressure
  on 15m bars. ATR-based market making with dynamic inventory targeting captures mean-reversion
  while adaptive spread multipliers during high volatility periods (ATR > 20-period
  MA) reduce adverse selection. Strategy achieves positive Sharpe >0.8 with <20% drawdown.
adapter_mode: atr_mm
parameter_space:
  atr_period:
  - 10
  - 14
  - 20
  spread_multiplier:
  - 1.2
  - 2.0
  - 3.0
  inventory_target:
  - 0.2
  - 0.5
  - 0.8
  max_position_pct:
  - 0.15
  - 0.25
  - 0.35
entry_logic: Place buy quotes at mid - (spread_multiplier * ATR) and sell quotes at  mid
  + (spread_multiplier * ATR). Increase spread_multiplier by 50% when current ATR
  exceeds its 20-period moving average to avoid adverse fills during volatile periods.
exit_logic: When inventory exceeds inventory_target threshold, skew quotes aggressively
  toward reducing position (tighter spread on exit side, wider on entry side). Force
  close positions when they exceed max_position_pct of total equity.
base_config:
  strategy_class: atr_mm
  strategy_config:
    atr_period: 14
    spread_multiplier: 2.0
    inventory_target: 0.5
    max_position_pct: 0.25
    vol_adjustment: true
  data_source:
    exchange: bitget
    pair: BTC-USDT
    resolution: 15m
    instrument_type: perp
  initial_equity: '500'
  leverage: 1
  seed: 42
  step_interval_s: 900
  warmup_bars: 60
required_tests:
- test_adapter_compiles
- test_no_lookahead_in_entry
metadata:
  author: llm_exploration
  version: '1.0'
lifecycle: candidate

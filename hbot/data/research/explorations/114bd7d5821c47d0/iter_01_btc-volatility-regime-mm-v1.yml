name: btc-volatility-regime-mm-v1
hypothesis: BTC-USDT exhibits distinct volatility regimes where low-vol periods (ATR
  < 20-period median) favor tight spreads for inventory accumulation, while high-vol
  periods (ATR > 80th percentile) require wide defensive spreads. Market-making with
  regime-adaptive spread scaling and higher-timeframe trend bias achieves positive
  risk-adjusted returns by avoiding adverse selection during volatile breakouts while
  capturing mean-reversion in calm periods.
adapter_mode: atr_mm_v2
parameter_space:
  htf_ema_period:
  - 50
  - 100
  - 200
  vol_scalar_base:
  - 0.8
  - 1.2
  - 1.8
  trend_bias_strength:
  - 0.1
  - 0.3
  - 0.5
  regime_lookback:
  - 20
  - 30
  - 50
entry_logic: Calculate ATR regime using regime_lookback periods. In low-vol regime
  (ATR < median), use vol_scalar_base * 0.7 for tight spreads. In high-vol regime
  (ATR > 80th percentile), use vol_scalar_base * 2.0 for wide spreads. Apply trend_bias_strength
  skew based on htf_ema_period trend direction to favor quotes in trend direction.
exit_logic: Reduce inventory when position exceeds 70% of target through aggressive
  pricing on heavy side. Emergency exit if position reaches 150% of max_position_pct
  or if ATR spikes above 3x recent median (flash crash protection).
base_config:
  strategy_class: atr_mm_v2
  strategy_config:
    htf_ema_period: 100
    vol_scalar_base: 1.2
    trend_bias_strength: 0.3
    regime_lookback: 30
    max_position_pct: '0.4'
    inventory_target: '0.5'
  data_source:
    exchange: bitget
    pair: BTC-USDT
    resolution: 15m
    instrument_type: perp
  initial_equity: '500'
  leverage: 1
  seed: 42
  step_interval_s: 900
  warmup_bars: 60
required_tests:
- test_adapter_compiles
- test_no_lookahead_in_entry
metadata:
  author: llm_exploration
  version: '1.0'
lifecycle: candidate

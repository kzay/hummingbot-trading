name: btc-fvg-breakout-momentum-v1
hypothesis: BTC-USDT 1m bars exhibit momentum continuation after breaking out of  Fair
  Value Gaps (FVG) with high volume confirmation. The combo_mm adapter's FVG detection
  combined with volume-weighted momentum filters should capture these breakouts while
  the fill-feedback mechanism reduces adverse selection during false breakouts. Expect
  positive Sharpe ratio when momentum_threshold is calibrated to recent volatility
  and volume_multiplier filters for  significant participation.
adapter_mode: combo_mm
parameter_space:
  fvg_lookback:
  - 5
  - 8
  - 12
  momentum_threshold:
  - 0.5
  - 1.0
  - 1.5
  - 2.0
  volume_multiplier:
  - 1.2
  - 1.5
  - 2.0
  position_sizing_factor:
  - 0.03
  - 0.05
  - 0.08
  - 0.12
entry_logic: Enter long when price breaks above a bearish FVG (identified over  fvg_lookback
  bars) AND current bar momentum exceeds momentum_threshold * recent ATR AND volume
  exceeds volume_multiplier * 20-period average volume. Enter short on inverse conditions
  with bullish FVG breakdown. Use microstructure signals to time precise entry within
  the breakout bar.
exit_logic: Exit when momentum reverses (momentum falls below 0.3 * momentum_threshold)
  OR when fill-feedback indicates adverse selection pattern OR when  position reaches
  2x initial risk target. Use trailing stop based on ATR once position moves favorably
  by 1.5x initial risk.
base_config:
  strategy_class: combo_mm
  strategy_config:
    fvg_lookback: 8
    momentum_threshold: 1.0
    volume_multiplier: 1.5
    position_sizing_factor: 0.05
  data_source:
    exchange: bitget
    pair: BTC-USDT
    resolution: 1m
    instrument_type: perp
  initial_equity: '500'
  leverage: 1
  seed: 42
  step_interval_s: 60
  warmup_bars: 60
required_tests:
- test_adapter_compiles
- test_no_lookahead_in_entry
metadata:
  author: llm_exploration
  version: '1.0'
lifecycle: candidate

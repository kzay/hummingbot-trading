name: btc-volatility-regime-mm-v1
hypothesis: BTC-USDT exhibits distinct volatility regimes where low-vol periods (ATR
  below 20-period SMA)  favor tight spreads for frequent fills, while high-vol periods
  (ATR above threshold) require  wider spreads to avoid adverse selection. Market-making
  with regime-adaptive spread sizing  and higher-timeframe EMA trend bias captures
  mean-reversion in stable periods while avoiding  whipsaws during volatility breakouts.
adapter_mode: atr_mm_v2
parameter_space:
  htf_ema:
  - 50
  - 100
  - 200
  vol_scalar:
  - 0.8
  - 1.2
  - 1.8
  trend_bias:
  - 0.1
  - 0.3
  - 0.5
  atr_period:
  - 14
  - 20
entry_logic: Place buy/sell quotes around mid price adjusted by HTF EMA trend bias.  Spread
  width scales with vol_scalar * ATR(atr_period). When ATR > 1.5x  its 20-period SMA,
  increase spread to avoid fills during volatility spikes.  Bias quotes toward trend
  direction when price is above/below HTF EMA.
exit_logic: Reduce inventory when position exceeds target via skewed pricing on heavy
  side.  Force flatten when ATR spikes >3x recent average to avoid holding through  major
  volatility events. Inventory management becomes more aggressive in  high-vol regimes.
base_config:
  strategy_class: atr_mm_v2
  strategy_config:
    htf_ema: 100
    vol_scalar: 1.2
    trend_bias: 0.3
    atr_period: 14
    max_position_pct: 0.8
    inventory_target: 0.5
  data_source:
    exchange: bitget
    pair: BTC-USDT
    resolution: 15m
    instrument_type: perp
  initial_equity: '500'
  leverage: 1
  seed: 42
  step_interval_s: 900
  warmup_bars: 60
required_tests:
- test_adapter_compiles
- test_no_lookahead_in_entry
metadata:
  author: llm_exploration
  version: '1.0'
lifecycle: candidate

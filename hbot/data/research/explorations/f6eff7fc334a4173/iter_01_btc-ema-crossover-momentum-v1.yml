name: btc-ema-crossover-momentum-v1
hypothesis: BTC-USDT perpetual exhibits directional momentum persistence after EMA
  crossovers on 15m timeframe. Fast EMA crossing above slow EMA signals upward momentum
  that persists for 3-8 bars, while crossovers below signal downward momentum. Simple
  market-making with directional bias captures this edge while spread management controls
  adverse selection risk.
adapter_mode: simple
parameter_space:
  ema_fast:
  - 8
  - 12
  - 16
  ema_slow:
  - 21
  - 34
  - 55
  spread_mult:
  - 1.2
  - 2.0
  - 3.0
  bias_strength:
  - 0.3
  - 0.5
  - 0.8
entry_logic: Calculate fast EMA(ema_fast) and slow EMA(ema_slow) on completed bars.
  When fast EMA > slow EMA, bias quotes toward long side by reducing ask spread by
  bias_strength factor and widening bid spread. When fast EMA < slow EMA, bias toward
  short side by reducing bid spread and widening ask spread. Base spread is spread_mult
  * ATR(14).
exit_logic: Exit positions when EMA crossover reverses (momentum signal flips) or
  when position reaches maximum exposure limits. Inventory management through asymmetric
  quote placement reduces accumulated directional risk.
base_config:
  strategy_class: simple
  strategy_config:
    ema_period: 21
    spread_mult: 2.0
    max_position_pct: 0.8
  data_source:
    exchange: bitget
    pair: BTC-USDT
    resolution: 15m
    instrument_type: perp
  initial_equity: '500'
  leverage: 1
  seed: 42
  step_interval_s: 900
  warmup_bars: 60
required_tests:
- test_adapter_compiles
- test_no_lookahead_in_entry
metadata:
  author: llm_exploration
  version: '1.0'
  notes: EMA crossover momentum with directional MM bias
lifecycle: candidate

name: btc-momentum-burst-scalper-v1
hypothesis: BTC-USDT 15m bars exhibit short-lived momentum bursts following rapid
  price moves that exceed 1.5x ATR. These bursts continue for 2-4 bars before exhausting,
  creating scalping opportunities with tight trailing stops. Higher burst thresholds
  reduce false signals but may miss smaller edges.
adapter_mode: momentum_scalper
parameter_space:
  burst_threshold:
  - 1.2
  - 1.8
  - 2.5
  hold_bars:
  - 2
  - 4
  - 6
  trail_atr:
  - 0.8
  - 1.2
  - 1.8
  min_volume_ratio:
  - 1.0
  - 1.5
  - 2.0
entry_logic: Enter long when current bar's range exceeds burst_threshold * ATR(14)
  AND close > open AND volume > min_volume_ratio * 20-period average volume. Enter
  short when current bar's range exceeds burst_threshold * ATR(14) AND close < open
  AND volume > min_volume_ratio * 20-period average volume. Only enter if no position
  currently held.
exit_logic: Exit after hold_bars completed bars OR when price moves against position
  by trail_atr * ATR(14) from the most favorable price since entry. Hard stop at 3x
  ATR from entry price to limit catastrophic losses.
base_config:
  strategy_class: momentum_scalper
  strategy_config:
    burst_threshold: 1.8
    hold_bars: 4
    trail_atr: 1.2
    min_volume_ratio: 1.5
  data_source:
    exchange: bitget
    pair: BTC-USDT
    resolution: 15m
    instrument_type: perp
  initial_equity: '500'
  leverage: 1
  seed: 42
  step_interval_s: 900
  warmup_bars: 60
required_tests:
- test_adapter_compiles
- test_no_lookahead_in_entry
metadata:
  author: llm_exploration
  version: '1.0'
lifecycle: candidate

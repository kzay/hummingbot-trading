name: btc-pullback-trend-continuation-v1
hypothesis: BTC-USDT perpetual exhibits reliable trend continuation patterns where
  pullbacks of 1.5-3.0 ATR against the dominant 50-period EMA trend provide low-risk
  entry opportunities. Long entries after pullbacks in uptrends and short entries
  after rallies in downtrends should yield positive Sharpe ratios with 2:1 risk-reward.
adapter_mode: pullback
parameter_space:
  pullback_depth_atr:
  - 1.5
  - 2.0
  - 3.0
  trend_ema_period:
  - 34
  - 50
  - 89
  stop_atr_mult:
  - 1.0
  - 1.5
  - 2.0
  target_atr_mult:
  - 2.0
  - 3.0
  - 4.0
entry_logic: Enter long when price is above trend_ema_period EMA (uptrend) and current
  price has pulled back pullback_depth_atr * ATR(14) below the recent swing high.
  Enter short when price is below trend EMA (downtrend) and current price has rallied
  pullback_depth_atr * ATR(14) above the recent swing low. Confirm entry with RSI(14)
  showing divergence from price extreme.
exit_logic: Exit at target_atr_mult * ATR(14) profit target or stop_atr_mult * ATR(14)
  stop loss from entry price. Also exit if trend EMA slope reverses (3-bar average
  slope changes sign) indicating potential trend exhaustion.
base_config:
  strategy_class: pullback
  strategy_config:
    pullback_depth_atr: 2.0
    trend_ema_period: 50
    stop_atr_mult: 1.5
    target_atr_mult: 3.0
    position_size_pct: 0.15
    max_hold_bars: 48
  data_source:
    exchange: bitget
    pair: BTC-USDT
    resolution: 15m
    instrument_type: perp
  initial_equity: '500'
  leverage: 1
  seed: 42
  step_interval_s: 900
  warmup_bars: 100
required_tests:
- test_adapter_compiles
- test_no_lookahead_in_entry
metadata:
  author: llm_exploration
  version: '1.0'
lifecycle: candidate

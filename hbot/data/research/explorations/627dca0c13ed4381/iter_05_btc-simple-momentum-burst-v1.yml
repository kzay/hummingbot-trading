name: btc-simple-momentum-burst-v1
hypothesis: BTC-USDT perpetual shows exploitable momentum bursts when price breaks
  above/below recent range with volume confirmation. Simple entries on range breakouts
  with tight stops and quick exits capture momentum without complex regime detection.
  Strategy holds positions for maximum 4-8 bars to avoid regime shifts.
adapter_mode: momentum_scalper
parameter_space:
  burst_threshold:
  - 1.5
  - 2.0
  - 2.5
  hold_bars:
  - 4
  - 6
  - 8
  trail_atr:
  - 0.8
  - 1.2
  - 1.8
  volume_mult:
  - 1.2
  - 1.5
  - 2.0
entry_logic: Enter long when current bar's high exceeds highest high of last 10 bars
  by burst_threshold * ATR(14) AND volume exceeds volume_mult * SMA(volume, 10). Enter
  short when current bar's low breaks lowest low of last 10 bars by burst_threshold
  * ATR(14) AND volume exceeds volume_mult * SMA(volume, 10).
exit_logic: Exit after hold_bars completed bars regardless of profit/loss. Trail stop
  at trail_atr * ATR(14) from peak favorable price. Hard stop at 2.5 * ATR(14) from
  entry price.
base_config:
  strategy_class: momentum_scalper
  strategy_config:
    burst_threshold: 2.0
    hold_bars: 6
    trail_atr: 1.2
    volume_mult: 1.5
    risk_pct: '0.05'
    max_position_pct: '0.15'
  data_source:
    exchange: bitget
    pair: BTC-USDT
    resolution: 15m
    instrument_type: perp
  initial_equity: '500'
  leverage: 1
  seed: 42
  step_interval_s: 900
  warmup_bars: 60
required_tests:
- test_adapter_compiles
- test_no_lookahead_in_entry
metadata:
  author: llm_exploration
  version: '1.0'
lifecycle: candidate

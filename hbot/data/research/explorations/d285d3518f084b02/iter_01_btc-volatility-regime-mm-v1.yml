name: btc-volatility-regime-mm-v1
hypothesis: BTC-USDT exhibits distinct volatility regimes where low-volatility periods
  (BB width <1.5% of mid) favor tight market-making spreads, while high-volatility
  periods (BB width >3% of mid) require wider spreads and inventory bias toward the
  mean-reverting direction. The smc_mm adapter's regime detection captures these transitions
  and adjusts quoting behavior accordingly.
adapter_mode: smc_mm
parameter_space:
  bb_period:
  - 15
  - 20
  - 30
  regime_threshold:
  - 0.015
  - 0.025
  - 0.035
  fvg_lookback:
  - 3
  - 5
  - 8
  base_spread_bps:
  - 8
  - 15
  - 25
entry_logic: Detect volatility regime using Bollinger Band width as percentage of
  mid price. In low-vol regime (BB width < regime_threshold), quote tight spreads
  at base_spread_bps. In high-vol regime (BB width > regime_threshold), widen spreads
  by 2x and bias quotes toward BB middle band direction. Use FVG detection over fvg_lookback
  bars to identify institutional flow direction and skew inventory accordingly.
exit_logic: Maintain inventory target near zero in low-vol regimes for pure market-making.
  In high-vol regimes, allow temporary directional bias up to 30% of equity toward
  mean-reversion direction. Force inventory reduction when regime switches or when
  position exceeds 50% of equity via aggressive pricing.
base_config:
  strategy_class: smc_mm
  strategy_config:
    bb_period: 20
    regime_threshold: 0.025
    fvg_lookback: 5
    base_spread_bps: 15
    max_position_pct: 0.5
    inventory_half_life: 600
  data_source:
    exchange: bitget
    pair: BTC-USDT
    resolution: 15m
    instrument_type: perp
  initial_equity: '500'
  leverage: 1
  seed: 42
  step_interval_s: 900
  warmup_bars: 60
required_tests:
- test_adapter_compiles
- test_no_lookahead_in_entry
metadata:
  author: llm_exploration
  version: '1.0'
lifecycle: candidate

# Bot5 - IFT/JOTA institutional-flow lane (paper engine)
id: epp_v2_4_bot5_ift_jota_paper
controller_name: epp_v2_4_bot5
controller_type: market_making

connector_name: bitget_perpetual
connector_type: perp
trading_pair: BTC-USDT

total_amount_quote: 140
buy_spreads: "0.00015,0.00040"
sell_spreads: "0.00015,0.00040"
buy_amounts_pct: "50,50"
sell_amounts_pct: "50,50"
executor_refresh_time: 60
cooldown_time: 10
leverage: 1
position_mode: ONEWAY
stop_loss: 0.004
take_profit: 0.004
time_limit: 900
take_profit_order_type: LIMIT
skip_rebalance: true
position_rebalance_min_base_mult: 5.0
max_order_notional_quote: 80

variant: a
enabled: true
no_trade: false
instance_name: bot5
log_dir: /home/hummingbot/logs

fee_mode: manual
fee_profile: vip0
require_fee_resolution: true
spot_fee_pct: 0.0002
slippage_est_pct: 0.00005
turnover_cap_x: 20.0
turnover_penalty_step: 0.0001

# IFT layer: liquidity/imbalance/break sensitivity.
min_net_edge_bps: 1.50
edge_resume_bps: 2.00
edge_state_hold_s: 75
ob_imbalance_depth: 10
ob_imbalance_skew_weight: 0.65
trend_eps_pct: 0.0006
regime_hold_ticks: 2
high_vol_band_pct: 0.0065
shock_drift_30s_pct: 0.0020
shock_drift_atr_multiplier: 1.10
drift_spike_threshold_bps: 5
drift_spike_mult_max: 1.25
spread_step_multiplier: 0.20
vol_penalty_multiplier: 0.20
adaptive_params_enabled: true
adaptive_edge_relax_max_bps: 2
adaptive_edge_tighten_max_bps: 4
adaptive_min_edge_bps_floor: 1.00

# Bot5 owns its own flow-conviction gate logic in `controllers/bots/bot5/ift_jota_v1.py`.
# Keep the shared bot1-style alpha/selective soft-pause layers disabled here.
shared_edge_gate_enabled: false
alpha_policy_enabled: false
selective_quoting_enabled: false
adverse_fill_soft_pause_enabled: false
edge_confidence_soft_pause_enabled: false
slippage_soft_pause_enabled: false

bot5_flow_imbalance_threshold: 0.18
bot5_flow_trend_threshold_pct: 0.0008
bot5_flow_bias_threshold: 0.65
bot5_flow_directional_threshold: 0.85
bot5_directional_target_net_base_pct: 0.05
bot5_low_conviction_extra_edge_bps: 0.90
bot5_directional_market_floor_bps: 0.25
startup_position_sync: true
auto_calibration_enabled: true
auto_calibration_shadow_mode: false
auto_calibration_update_interval_s: 600
auto_calibration_lookback_s: 1800
auto_calibration_max_step_bps: 0.20
auto_calibration_max_total_change_per_hour_bps: 0.60
auto_calibration_freeze_drawdown_pct: 0.030
auto_calibration_freeze_daily_loss_pct: 0.015
max_quote_to_market_spread_mult: 0.00
min_side_spread_bps: 0.30
pnl_governor_enabled: false
daily_pnl_target_pct: 0.4
pnl_governor_max_edge_bps_cut: 3
pnl_governor_max_size_boost_pct: 0.15
pnl_governor_turnover_soft_cap_x: 5.0
pnl_governor_drawdown_soft_cap_pct: 0.012

# JOTA layer: the dedicated bot5 controller decides when conviction is strong
# enough to bias inventory or switch into one-sided directional scalping. The
# static regime configs stay two-sided by default so shared safety plumbing
# remains intact when conviction is weak or contradictory.
regime_specs_override:
  up:
    one_sided: "off"
    spread_min: "0.00018"
    spread_max: "0.00065"
    levels_min: 2
    levels_max: 2
    refresh_s: 45
    target_base_pct: "0.0"
    fill_factor: "0.90"
    quote_size_pct_min: "0.0025"
    quote_size_pct_max: "0.0040"
  down:
    one_sided: "off"
    spread_min: "0.00018"
    spread_max: "0.00065"
    levels_min: 2
    levels_max: 2
    refresh_s: 45
    target_base_pct: "0.0"
    fill_factor: "0.90"
    quote_size_pct_min: "0.0025"
    quote_size_pct_max: "0.0040"
  neutral_low_vol:
    one_sided: "off"
    spread_min: "0.00012"
    spread_max: "0.00035"
    levels_min: 2
    levels_max: 2
    refresh_s: 40
    target_base_pct: "0.0"
    fill_factor: "0.95"
    quote_size_pct_min: "0.0030"
    quote_size_pct_max: "0.0050"
  neutral_high_vol:
    one_sided: "off"
    spread_min: "0.00022"
    spread_max: "0.00085"
    levels_min: 1
    levels_max: 2
    refresh_s: 35
    target_base_pct: "0.0"
    fill_factor: "0.85"
    quote_size_pct_min: "0.0025"
    quote_size_pct_max: "0.0040"
  high_vol_shock:
    one_sided: "off"
    spread_min: "0.00030"
    spread_max: "0.00100"
    levels_min: 1
    levels_max: 1
    refresh_s: 30
    target_base_pct: "0.0"
    fill_factor: "0.75"
    quote_size_pct_min: "0.0020"
    quote_size_pct_max: "0.0035"

# Perp inventory/risk defaults stay near neutral unless bot5 flow conviction
# explicitly biases the signed net target in the dedicated controller.
perp_target_net_base_pct: 0.0
min_base_pct: 0.0
max_base_pct: 0.55
max_total_notional_quote: 140
max_daily_turnover_x_hard: 40.0
max_daily_loss_pct_hard: 0.020
max_drawdown_pct_hard: 0.035
max_active_executors: 8
adverse_fill_spread_multiplier: 1.25
adverse_fill_count_threshold: 16

paper_edge_gate_bypass: false
paper_use_portfolio_equity_for_risk: true
paper_state_reconcile_enabled: true
paper_daily_baseline_auto_reset_on_startup: true
paper_engine:
  paper_equity_quote: 200
  paper_realism_profile: balanced
  paper_seed: 17
  paper_reset_state_on_startup: false
  paper_fill_model: latency_aware
  paper_latency_model: configured_latency_ms
  paper_latency_ms: 120
  paper_insert_latency_ms: 20
  paper_cancel_latency_ms: 70
  paper_liquidity_consumption: true
  paper_queue_participation: 0.50
  paper_slippage_bps: 1.0
  paper_adverse_selection_bps: 1.2
  paper_prob_fill_on_limit: 0.95
  paper_prob_slippage: 0.0
  paper_partial_fill_min_ratio: 0.10
  paper_partial_fill_max_ratio: 0.45
  paper_depth_levels: 5
  paper_depth_decay: 0.70
  paper_queue_position_enabled: true
  paper_queue_ahead_ratio: 0.40
  paper_queue_trade_through_ratio: 0.30
  paper_price_protection_points: 8
  paper_margin_model_type: leveraged
  paper_max_fills_per_order: 3

sample_interval_s: 10
spread_floor_recalc_s: 30
cancel_budget_per_min: 30
position_drift_soft_pause_pct: 2.0

# WS churn tolerance (pass-2): tolerate short feed stalls before pausing.
max_clock_skew_s: 15
reconnect_cooldown_s: 20
order_book_stale_after_s: 75
order_book_stale_soft_pause_after_s: 360
order_book_reconnect_grace_s: 180

# Bot6 - CVD Divergence directional lane (paper engine)
# Trend-following via spot-vs-perp CVD divergence on BTC-USDT perpetual.
id: epp_v2_4_bot6_bitget_cvd_paper
controller_name: epp_v2_4_bot6
controller_type: directional

connector_name: bitget_perpetual
connector_type: perp
trading_pair: BTC-USDT
position_mode: ONEWAY

total_amount_quote: 400
buy_spreads: "0.0012"
sell_spreads: "0.0012"
buy_amounts_pct: "100"
sell_amounts_pct: "100"
executor_refresh_time: 45
cooldown_time: 10
leverage: 1
max_order_notional_quote: 200
stop_loss: 0.004
take_profit: 0.010
time_limit: 900
take_profit_order_type: LIMIT
skip_rebalance: true
position_rebalance_min_base_mult: 5.0

variant: a
enabled: true
no_trade: false
instance_name: bot6
log_dir: /home/hummingbot/logs

fee_mode: manual
fee_profile: vip0
require_fee_resolution: true
spot_fee_pct: 0.0002
slippage_est_pct: 0.00005
turnover_cap_x: 20.0
turnover_penalty_step: 0.0001
# MM-only params (edge gate, adaptive spreads, governor) are disabled by DirectionalRuntimeConfig
edge_state_hold_s: 75
trend_eps_pct: 0.0006
high_vol_band_pct: 0.0065
shock_drift_30s_pct: 0.0020
shock_drift_atr_multiplier: 1.10

# ── Indicators ────────────────────────────────────────────────────────
atr_period: 14

# ── CVD divergence signal ─────────────────────────────────────────────
bot6_spot_connector_name: bitget
bot6_spot_trading_pair: BTC-USDT
bot6_candle_interval: 1m
bot6_sma_fast_period: 20
bot6_sma_slow_period: 60
bot6_adx_period: 14
bot6_adx_threshold: 18

# ── Trade flow windows ────────────────────────────────────────────────
bot6_trade_window_count: 30
bot6_spot_trade_window_count: 30
bot6_trade_features_stale_after_ms: 90000

# ── Signal scoring ────────────────────────────────────────────────────
bot6_cvd_divergence_threshold_pct: 0.15
bot6_stacked_imbalance_min: 3
bot6_delta_spike_threshold: 3.0
bot6_signal_score_threshold: 5

# ── Position sizing ──────────────────────────────────────────────────
bot6_directional_target_net_base_pct: 0.12
bot6_dynamic_size_floor_mult: 0.80
bot6_dynamic_size_cap_mult: 1.50

# ── Funding filter ───────────────────────────────────────────────────
bot6_long_funding_max: 0.0005
bot6_short_funding_min: -0.0003

# ── Hedge / flip ─────────────────────────────────────────────────────
bot6_partial_exit_on_flip_ratio: 0.50
bot6_enable_hedge_bias: true

startup_position_sync: true
min_side_spread_bps: 0.30


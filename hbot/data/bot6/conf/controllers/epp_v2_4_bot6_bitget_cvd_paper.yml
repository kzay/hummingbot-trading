    target_base_pct: "0.0"
    fill_factor: "0.90"
    quote_size_pct_min: "0.0025"
    quote_size_pct_max: "0.0035"
  down:
    one_sided: "off"
    spread_min: "0.0012"
    spread_max: "0.0045"
    levels_min: 1
    levels_max: 1
    refresh_s: 45
    target_base_pct: "0.0"
    fill_factor: "0.90"
    quote_size_pct_min: "0.0025"
    quote_size_pct_max: "0.0035"
  neutral_low_vol:
    one_sided: "off"
    spread_min: "0.0008"
    spread_max: "0.0035"
    levels_min: 1
    levels_max: 1

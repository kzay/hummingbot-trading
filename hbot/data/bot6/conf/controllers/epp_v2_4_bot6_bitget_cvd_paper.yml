max_daily_turnover_x_hard: 40.0
max_daily_loss_pct_hard: 0.025
max_drawdown_pct_hard: 0.035
max_active_executors: 4

paper_engine:
  paper_equity_quote: 1000
  paper_realism_profile: balanced
  paper_seed: 23
  paper_reset_state_on_startup: false
  paper_fill_model: latency_aware
  paper_latency_model: configured_latency_ms
  paper_latency_ms: 120
  paper_insert_latency_ms: 20
  paper_cancel_latency_ms: 70
  paper_liquidity_consumption: true
  paper_queue_participation: 0.50
  paper_slippage_bps: 1.0
  paper_adverse_selection_bps: 1.2
  paper_prob_fill_on_limit: 0.95
  paper_prob_slippage: 0.0
  paper_partial_fill_min_ratio: 0.10
  paper_partial_fill_max_ratio: 0.45
  paper_depth_levels: 5
  paper_depth_decay: 0.70
  paper_queue_position_enabled: true
  paper_queue_ahead_ratio: 0.40
  paper_queue_trade_through_ratio: 0.30
  paper_price_protection_points: 8
  paper_margin_model_type: leveraged
  paper_max_fills_per_order: 3

sample_interval_s: 10
price_buffer_source: mark
spread_floor_recalc_s: 30
cancel_budget_per_min: 30
position_drift_soft_pause_pct: 2.0
max_clock_skew_s: 15
reconnect_cooldown_s: 20

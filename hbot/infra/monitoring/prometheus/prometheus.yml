# ============================================
# Prometheus Configuration
# ============================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    cluster: "kzay-capital-prod"
    environment: "production"

# ---- Alert Rules ----
rule_files:
  - "/etc/prometheus/alert_rules.yml"
  - "/etc/prometheus/recording_rules.yml"

# ---- Alertmanager ----
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

# ---- Scrape Targets ----
scrape_configs:

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          instance: "prometheus"
    relabel_configs:
      - target_label: cluster
        replacement: "kzay-capital-prod"
      - target_label: environment
        replacement: "production"

  # Node Exporter - host-level metrics (CPU, RAM, disk, network)
  - job_name: "node-exporter"
    scrape_interval: 10s
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: "vps-host"
    relabel_configs:
      - target_label: cluster
        replacement: "kzay-capital-prod"
      - target_label: environment
        replacement: "production"

  # cAdvisor - container-level metrics
  - job_name: "cadvisor"
    scrape_interval: 10s
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          instance: "docker-containers"
    relabel_configs:
      - target_label: cluster
        replacement: "kzay-capital-prod"
      - target_label: environment
        replacement: "production"

  # Bot metrics exporter (strategy KPIs and bot runtime signals)
  - job_name: "bot-metrics"
    scrape_interval: 15s
    scrape_timeout: 14s
    static_configs:
      - targets: ["metrics-exporter:9400"]
        labels:
          instance: "metrics-exporter"
    relabel_configs:
      - target_label: cluster
        replacement: "kzay-capital-prod"
      - target_label: environment
        replacement: "production"

  # Control-plane metrics exporter (gate health + freshness)
  - job_name: "control-plane-metrics"
    scrape_interval: 15s
    static_configs:
      - targets: ["metrics-exporter:9401"]
        labels:
          instance: "metrics-exporter"
    relabel_configs:
      - target_label: cluster
        replacement: "kzay-capital-prod"
      - target_label: environment
        replacement: "production"

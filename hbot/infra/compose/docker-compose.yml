    restart: unless-stopped
    logging: *default-logging
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--auto-aof-rewrite-percentage",
        "50",
        "--auto-aof-rewrite-min-size",
        "64mb",
        "--maxmemory",
        "${REDIS_MAXMEMORY:-1536mb}",
        "--maxmemory-policy",
        "${REDIS_MAXMEMORY_POLICY:-noeviction}",
        "--requirepass",
        "${REDIS_PASSWORD:-kzay_redis_paper_2026}",
      ]
    ports:
      - "${REDIS_BIND_IP:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - trading
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-kzay_redis_paper_2026} --no-auth-warning ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.1"


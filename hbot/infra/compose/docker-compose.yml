# ============================================
# Kzay Capital Trading Infrastructure
# docker-compose.yml - Production Configuration
# ============================================
# Usage:
#   cp ../env/.env.template ../env/.env  # then edit with real values
#   docker compose --env-file ../env/.env -f docker-compose.yml up -d
# ============================================

name: kzay-capital

# ---- Networks ----
networks:
  trading:
    driver: bridge
    name: kzay-capital-trading
  monitoring:
    driver: bridge
    name: kzay-capital-monitoring

# ---- Volumes ----
volumes:
  prometheus-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local

# ---- Logging anchor ----
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "${LOG_MAX_SIZE:-50m}"
    max-file: "${LOG_MAX_FILE:-5}"

# ---- External control-plane image (dev: :latest; pin via KZAY_CAPITAL_CONTROL_PLANE_IMAGE for prod) ----
x-control-plane-image: &control-plane-image
  image: ${KZAY_CAPITAL_CONTROL_PLANE_IMAGE:-kzay-capital-control-plane:latest}
  build:
    context: ../..
    dockerfile: infra/compose/images/control_plane/Dockerfile

# ---- Shared Hummingbot env ----
x-kzay-env: &kzay-env
  TZ: ${TZ:-UTC}
  PYTHONPYCACHEPREFIX: /tmp/pycache
  EXT_SIGNAL_RISK_ENABLED: ${EXT_SIGNAL_RISK_ENABLED:-true}
  BUS_SOFT_PAUSE_ON_OUTAGE: ${BUS_SOFT_PAUSE_ON_OUTAGE:-false}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_DB: ${REDIS_DB:-0}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-kzay_redis_paper_2026}
  # Required for passworded redis-server; code fallback used to omit password → AUTH errors.
  REDIS_URL: redis://:${REDIS_PASSWORD:-kzay_redis_paper_2026}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/${REDIS_DB:-0}
  REDIS_CONSUMER_GROUP: ${REDIS_CONSUMER_GROUP:-hb_group_v1}
  EVENT_POLL_MS: ${EVENT_POLL_MS:-1000}
  HB_MARKET_DEPTH_LEVELS: ${HB_MARKET_DEPTH_LEVELS:-20}
  HB_STRATEGY_HOT_PATH_REPORT_PATH: ${HB_STRATEGY_HOT_PATH_REPORT_PATH:-/workspace/hbot/reports/verification/strategy_hot_path_latest.json}
  HB_BRIDGE_LATENCY_REPORT_PATH: ${HB_BRIDGE_LATENCY_REPORT_PATH:-/workspace/hbot/reports/verification/hb_bridge_hot_path_latest.json}
  # ---- V3 Trading Desk (shadow mode by default, disabled unless per-bot override) ----
  V3_DESK_ENABLED: ${V3_DESK_ENABLED:-false}
  V3_DESK_MODE: ${V3_DESK_MODE:-shadow}

# ---- Hummingbot base anchor ----
x-kzay-base: &kzay-base
  image: ${HUMMINGBOT_IMAGE:-hummingbot/hummingbot:latest}
  restart: unless-stopped
  logging: *default-logging
  networks:
    - trading
  environment: *kzay-env
  stdin_open: true
  tty: true

# ============================================
# Services
# ============================================
services:
  # ==========================================
  # BOT 1
  # ==========================================
  bot1:
    <<: *kzay-base
    container_name: bot1
    env_file:
      - ../env/.env
    volumes:
      # ---- Bot config, data, logs ----
      - ../../data/bot1/conf:/home/hummingbot/conf
      - ../../data/shared/conf/connectors:/home/hummingbot/conf/connectors
      - ../../data/bot1/logs:/home/hummingbot/logs
      - ../../data/bot1/data:/home/hummingbot/data
      - ../../data/bot1/scripts:/home/hummingbot/custom_scripts
      - ../../reports:/home/hummingbot/reports:ro
      - ../../scripts/shared/v2_with_controllers.py:/home/hummingbot/scripts/v2_with_controllers.py:ro
      - ../../scripts/shared/headless_start.py:/home/hummingbot/bin/headless_start.py:ro
      - ../../data/bot1/pmm_scripts:/home/hummingbot/pmm_scripts
      # ---- Shared controllers mount (Day 30) ----
      - ../../controllers:/home/hummingbot/controllers:ro
      - ../../config:/home/hummingbot/project_config:ro
      - ../../services:/home/hummingbot/services:ro
      # ---- Refactored packages (pro-grade split) ----
      - ../../simulation:/home/hummingbot/simulation:ro
      - ../../platform_lib:/home/hummingbot/platform_lib:ro
    command: /bin/bash -lc "export CONFIG_PASSWORD=\"$${CONFIG_PASSWORD:-$${BOT1_PASSWORD:-}}\"; if [ -z \"$${CONFIG_PASSWORD}\" ]; then echo '[fatal] BOT1_PASSWORD/CONFIG_PASSWORD missing; refusing interactive startup.' >&2; exit 64; fi; conda activate hummingbot && python ./bin/headless_start.py 2>> ./logs/errors.log"
    environment:
      <<: *kzay-env
      EXT_SIGNAL_RISK_ENABLED: "true"
      REDIS_CONSUMER_GROUP: hb_group_bot1
      CONFIG_FILE_NAME: v2_with_controllers.py
      SCRIPT_CONFIG: ${BOT1_SCRIPT_CONFIG:-v2_epp_v2_4_bot1_wider_spread_exp.yml}
      BOT_MODE: ${BOT1_MODE:-paper}
      HEADLESS_MODE: "true"
      HB_ORDER_EXEC_TRACE_ALL_LEVELS: "true"
      PAPER_EXCHANGE_SERVICE_ONLY_BOT1: "false"
      PAPER_EXCHANGE_MODE: ${PAPER_EXCHANGE_MODE_BOT1:-disabled}
      PAPER_EXCHANGE_SYNC_TIMEOUT_MS: ${PAPER_EXCHANGE_SYNC_TIMEOUT_MS:-30000}
      BOT_POLICY_ROLE: live_microcap_primary
      BOT_POLICY_MODE: live
      BOT_POLICY_VERSION: multi_bot_policy_v1
      HB_BITGET_WS_HEARTBEAT_S: "20"
      HB_BITGET_WS_MESSAGE_TIMEOUT_S: "120"
      HB_BITGET_WS_MAX_CONSEC_TIMEOUTS: "6"
      HB_BITGET_WS_TIMEOUT_RETRY_SLEEP_S: "1.0"
      # ---- V3 Trading Desk ----
      V3_DESK_ENABLED: ${V3_DESK_ENABLED:-true}
      V3_DESK_MODE: ${V3_DESK_MODE:-shadow}
      V3_DESK_BOT_ID: "bot1"
      V3_STRATEGY: "bot1_baseline"
      INSTANCE_NAME: "bot1"
    healthcheck:
      # Restart only when both minute and heartbeat are stale.
      # If heartbeat is still fresh, allow minute-csv lag grace to avoid false
      # restarts during transient reconnect/recovery windows.
      test:
        [
          "CMD-SHELL",
          'python -c "import sys,time; from pathlib import Path; stale_s=300; minute_grace_s=900; now=time.time(); files=list(Path(''/home/hummingbot/logs/epp_v24'').rglob(''minute.csv'')); newest=max((f.stat().st_mtime for f in files), default=0.0); hb=Path(''/home/hummingbot/logs/heartbeat/strategy_heartbeat.json''); hb_age=(now-hb.stat().st_mtime) if hb.exists() else 9999.0; minute_age=(now-newest) if files else 9999.0; hb_ok=hb_age<stale_s; minute_ok=bool(files) and minute_age<stale_s; minute_heartbeat_grace=bool(files) and hb_ok and minute_age<(stale_s+minute_grace_s); sys.exit(0 if ((minute_ok and hb_ok) or minute_heartbeat_grace) else 1)"',
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"

  # ==========================================
  # BOT 2 (scale replica)
  # ==========================================
  bot2:
    <<: *kzay-base
    container_name: bot2
    profiles:
      - multi
    env_file:
      - ../env/.env
    volumes:
      # ---- Bot config, data, logs ----
      - ../../data/bot2/conf:/home/hummingbot/conf
      - ../../data/shared/conf/connectors:/home/hummingbot/conf/connectors
      - ../../data/bot2/logs:/home/hummingbot/logs
      - ../../data/bot2/data:/home/hummingbot/data
      - ../../data/bot2/scripts:/home/hummingbot/custom_scripts
      - ../../reports:/home/hummingbot/reports:ro
      - ../../scripts/shared/v2_with_controllers.py:/home/hummingbot/custom_scripts/v2_with_controllers.py:ro
      - ../../scripts/shared/v2_with_controllers.py:/home/hummingbot/scripts/v2_with_controllers.py:ro
      - ../../scripts/shared/headless_start.py:/home/hummingbot/bin/headless_start.py:ro
      - ../../data/bot2/pmm_scripts:/home/hummingbot/pmm_scripts
      # ---- Shared controllers mount (Day 30) ----
      - ../../controllers:/home/hummingbot/controllers:ro
      - ../../config:/home/hummingbot/project_config:ro
      - ../../services:/home/hummingbot/services:ro
      # ---- Refactored packages (pro-grade split) ----
      - ../../simulation:/home/hummingbot/simulation:ro
      - ../../platform_lib:/home/hummingbot/platform_lib:ro
    command: /bin/bash -lc "export CONFIG_PASSWORD=\"$${CONFIG_PASSWORD:-$${BOT2_PASSWORD:-$${BOT1_PASSWORD:-}}}\"; if [ -z \"$${CONFIG_PASSWORD}\" ]; then echo '[fatal] BOT2_PASSWORD/BOT1_PASSWORD/CONFIG_PASSWORD missing; refusing interactive startup.' >&2; exit 64; fi; conda activate hummingbot && python ./bin/headless_start.py 2>> ./logs/errors.log"
    environment:
      <<: *kzay-env
      EXT_SIGNAL_RISK_ENABLED: "true"
      REDIS_CONSUMER_GROUP: hb_group_bot2
      CONFIG_FILE_NAME: v2_with_controllers.py
      SCRIPT_CONFIG: v2_epp_v2_4_bot_d.yml
      BOT_MODE: ${BOT2_MODE:-paper}
      HEADLESS_MODE: "true"
      HB_ORDER_EXEC_TRACE_ALL_LEVELS: "true"
      PAPER_EXCHANGE_SERVICE_ONLY_BOT1: "false"
      PAPER_EXCHANGE_MODE: ${PAPER_EXCHANGE_MODE_BOT2:-disabled}
      PAPER_EXCHANGE_SYNC_TIMEOUT_MS: ${PAPER_EXCHANGE_SYNC_TIMEOUT_MS:-30000}
      BOT_POLICY_ROLE: reserved_scale_slot
      BOT_POLICY_MODE: disabled
      BOT_POLICY_VERSION: multi_bot_policy_v1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import sys,time; from pathlib import Path; hb=Path(''/home/hummingbot/logs/heartbeat/strategy_heartbeat.json''); stale_ok=(time.time()-hb.stat().st_mtime)<300 if hb.exists() else False; minute_ok=True; files=list(Path(''/home/hummingbot/logs/epp_v24'').rglob(''minute.csv'')); minute_ok=(time.time()-max((f.stat().st_mtime for f in files), default=time.time()))<300 if files else True; sys.exit(0 if stale_ok and minute_ok else 1)"',
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:

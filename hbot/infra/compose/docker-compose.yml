  portfolio-allocator-service:
    <<: *control-plane-image
    container_name: portfolio-allocator-service
    restart: on-failure
    logging: *default-logging
    command: >
      /bin/sh -lc "python /workspace/hbot/services/portfolio_allocator/main.py"
    environment:
      - MULTI_BOT_POLICY_PATH=${MULTI_BOT_POLICY_PATH:-/workspace/hbot/config/multi_bot_policy_v1.json}
      - EXCHANGE_SNAPSHOT_PATH=${EXCHANGE_SNAPSHOT_PATH:-/workspace/hbot/reports/exchange_snapshots/latest.json}
      - PORTFOLIO_ALLOCATOR_REPORT_PATH=${PORTFOLIO_ALLOCATOR_REPORT_PATH:-/workspace/hbot/reports/policy/portfolio_allocator_latest.json}
      - PORTFOLIO_ALLOCATOR_INTERVAL_SEC=${PORTFOLIO_ALLOCATOR_INTERVAL_SEC:-300}
      - PORTFOLIO_ALLOCATOR_PUBLISH_INTENTS=${PORTFOLIO_ALLOCATOR_PUBLISH_INTENTS:-true}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-kzay_redis_paper_2026}
      - PORTFOLIO_ALLOCATOR_HEALTH_MAX_SEC=${PORTFOLIO_ALLOCATOR_HEALTH_MAX_SEC:-900}
    volumes:
      - ../..:/workspace/hbot
    depends_on:
      redis:
        condition: service_healthy
      ops-scheduler:
        condition: service_started
    networks:
      - trading
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import os,time,sys; from pathlib import Path; p=Path(''/workspace/hbot/reports/policy/portfolio_allocator_latest.json''); sys.exit(0 if p.exists() and (time.time()-p.stat().st_mtime)<=float(os.getenv(''PORTFOLIO_ALLOCATOR_HEALTH_MAX_SEC'',''900'')) else 1)"',
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 32M
          cpus: "0.05"

  telegram-bot:
    <<: *control-plane-image
    container_name: telegram-bot
    restart: on-failure
    logging: *default-logging
    command: >
      /bin/sh -lc "python /workspace/hbot/services/telegram_bot/main.py"
    env_file:
      - ../env/.env
    environment:
      - PYTHONPATH=/workspace/hbot
      - PYTHONPYCACHEPREFIX=/tmp/pycache
      - HB_DATA_ROOT=/workspace/hbot/data
    volumes:
      - ../..:/workspace/hbot:ro
    networks:
      - trading
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,time; p='/tmp/telegram_heartbeat'; exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p)<300 else 1)\""]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 64M

  kill-switch:
    <<: *control-plane-image
    container_name: kill-switch
    restart: unless-stopped
    logging: *default-logging
    command: >
      /bin/sh -lc "python /workspace/hbot/services/kill_switch/main.py"
    ports:
      - "${KILL_SWITCH_HTTP_PORT:-9900}:9900"
    environment:
      - KILL_SWITCH_DRY_RUN=${KILL_SWITCH_DRY_RUN:-true}
      - KILL_SWITCH_EXCHANGE=${KILL_SWITCH_EXCHANGE:-bitget}
      - KILL_SWITCH_API_KEY=${KILL_SWITCH_API_KEY:-${BOT1_BITGET_API_KEY:-}}
      - KILL_SWITCH_SECRET=${KILL_SWITCH_SECRET:-${BOT1_BITGET_API_SECRET:-}}
      - KILL_SWITCH_PASSPHRASE=${KILL_SWITCH_PASSPHRASE:-${BOT1_BITGET_PASSPHRASE:-}}
      - KILL_SWITCH_STOP_BOT=${KILL_SWITCH_STOP_BOT:-true}
      - KILL_SWITCH_BOT_CONTAINER=${KILL_SWITCH_BOT_CONTAINER:-bot1}
      - KILL_SWITCH_FLATTEN_POSITION=${KILL_SWITCH_FLATTEN_POSITION:-false}
      - KILL_SWITCH_HTTP_PORT=9900
      - EXT_SIGNAL_RISK_ENABLED=true
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-kzay_redis_paper_2026}
      - HB_INSTANCE_NAME=bot1
      - EVENT_PRODUCER_NAME=kill_switch
    volumes:
      - ../..:/workspace/hbot
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - trading
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:9900/health'')" 2>/dev/null || exit 1',
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 32M
          cpus: "0.05"

  ops-db-writer:
    <<: *control-plane-image
    container_name: ops-db-writer
    restart: on-failure
    logging: *default-logging
    command: >
      /bin/sh -lc "python /workspace/hbot/services/ops_db_writer/main.py"
    environment:
      - HB_DATA_ROOT=/workspace/hbot/data
      - HB_REPORTS_ROOT=/workspace/hbot/reports
      - OPS_DB_HOST=${OPS_DB_HOST:-postgres}
      - OPS_DB_PORT=${OPS_DB_PORT:-5432}
      - OPS_DB_NAME=${OPS_DB_NAME:-kzay_capital_ops}
      - OPS_DB_USER=${OPS_DB_USER:-kzay_capital}
      - OPS_DB_PASSWORD=${OPS_DB_PASSWORD:-kzay_capital_dev_password}
      - OPS_DB_WRITER_INTERVAL_SEC=${OPS_DB_WRITER_INTERVAL_SEC:-300}
      - OPS_DB_WRITER_HEALTH_MAX_SEC=${OPS_DB_WRITER_HEALTH_MAX_SEC:-21600}
      - OPS_DB_APPLY_SCHEMA_EACH_RUN=${OPS_DB_APPLY_SCHEMA_EACH_RUN:-false}
    volumes:
      - ../..:/workspace/hbot
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - trading
      - monitoring
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import os,time,sys; from pathlib import Path; p=Path(''/workspace/hbot/reports/ops_db_writer/latest.json''); sys.exit(0 if p.exists() and (time.time()-p.stat().st_mtime)<=float(os.getenv(''OPS_DB_WRITER_HEALTH_MAX_SEC'',''900'')) else 1)"',
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"

  # ==========================================
  # Monitoring Stack
  # ==========================================

  # ---- Bot KPI Exporter ----
  # ---- Unified Metrics Exporter (bot=9400 + control-plane=9401) ----
  metrics-exporter:
    <<: *control-plane-image
    container_name: metrics-exporter
    restart: unless-stopped
    logging: *default-logging
    command: >
      /bin/sh -lc "python /workspace/hbot/services/metrics_exporter/main.py"
    environment:
      - PYTHONPATH=/workspace/hbot
      - PYTHONPYCACHEPREFIX=/tmp/pycache
      # Bot metrics (port 9400)
      - HB_DATA_ROOT=/workspace/hbot/data
      - METRICS_PORT=9400
      - METRICS_PATH=/metrics
      - EXPORTER_LOG_TAIL_LINES=200
      - EXPORTER_CACHE_TTL_S=30
      # Control-plane metrics (port 9401)
      - HB_REPORTS_ROOT=/workspace/hbot/reports
      - CONTROL_PLANE_METRICS_PORT=9401
      - CONTROL_PLANE_METRICS_PATH=/metrics
      - CONTROL_PLANE_FRESHNESS_MAX_SEC=${CONTROL_PLANE_FRESHNESS_MAX_SEC:-1800}
      - REDIS_ENABLED=${REDIS_STREAMS_ENABLED:-true}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-kzay_redis_paper_2026}
      - PAPER_EXCHANGE_HEARTBEAT_STREAM=${PAPER_EXCHANGE_HEARTBEAT_STREAM:-hb.paper_exchange.heartbeat.v1}
      - PAPER_EXCHANGE_HEARTBEAT_MAX_AGE_SEC=${PAPER_EXCHANGE_HEARTBEAT_MAX_AGE_SEC:-30}
      - PAPER_EXCHANGE_LOAD_REPORT_PATH=${PAPER_EXCHANGE_LOAD_REPORT_PATH:-verification/paper_exchange_load_latest.json}
      - PAPER_EXCHANGE_THRESHOLD_INPUTS_PATH=${PAPER_EXCHANGE_THRESHOLD_INPUTS_PATH:-verification/paper_exchange_threshold_inputs_latest.json}
      - PAPER_EXCHANGE_COMMAND_JOURNAL_PATH=${PAPER_EXCHANGE_COMMAND_JOURNAL_PATH:-verification/paper_exchange_command_journal_latest.json}
      - PAPER_EXCHANGE_STATE_SNAPSHOT_PATH=${PAPER_EXCHANGE_STATE_SNAPSHOT_PATH:-verification/paper_exchange_state_snapshot_latest.json}
      - PAPER_EXCHANGE_PAIR_SNAPSHOT_PATH=${PAPER_EXCHANGE_PAIR_SNAPSHOT_PATH:-verification/paper_exchange_pair_snapshot_latest.json}
      - PAPER_EXCHANGE_MARKET_FILL_JOURNAL_PATH=${PAPER_EXCHANGE_MARKET_FILL_JOURNAL_PATH:-verification/paper_exchange_market_fill_journal_latest.json}
    volumes:
      - ../..:/workspace/hbot:ro
    networks:
      - monitoring
      - trading
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:9400/health')",
        ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"
        reservations:
          memory: 96M

  # ---- PostgreSQL Operational Store (Day 25) ----
  postgres:
    image: ${OPS_DB_IMAGE:-timescale/timescaledb:latest-pg16}
    container_name: postgres
    restart: unless-stopped
    logging: *default-logging
    command:
      [
        "postgres",
        "-c",
        "shared_preload_libraries=${OPS_DB_SHARED_PRELOAD_LIBRARIES:-timescaledb}",
      ]
    environment:
      - POSTGRES_DB=${OPS_DB_NAME:-kzay_capital_ops}
      - POSTGRES_USER=${OPS_DB_USER:-kzay_capital}
      - POSTGRES_PASSWORD=${OPS_DB_PASSWORD:-kzay_capital_dev_password}
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "${OPS_DB_BIND_IP:-127.0.0.1}:${OPS_DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - monitoring
      - trading
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${OPS_DB_USER:-kzay_capital} -d ${OPS_DB_NAME:-kzay_capital_ops}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ---- Prometheus (activate with --profile monitoring) ----
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    restart: unless-stopped
    logging: *default-logging
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
      - "--storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-5GB}"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ../monitoring/prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${MONITORING_BIND_IP:-127.0.0.1}:9090:9090"
    networks:
      - monitoring
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/healthy",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ---- Grafana (activate with --profile monitoring) ----
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    logging: *default-logging
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-kzay_grafana_2026}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${MONITORING_BIND_IP:-127.0.0.1}:3000:3000"
    networks:
      - monitoring
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 64M

  # ---- Node Exporter (activate with --profile monitoring) ----
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: on-failure
    logging: *default-logging
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/host/root"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
    ports:
      - "${MONITORING_BIND_IP:-127.0.0.1}:9100:9100"
    networks:
      - monitoring
    pid: host
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:9100/metrics",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 32M

  # ---- cAdvisor (activate with --profile monitoring) ----
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: on-failure
    logging: *default-logging
    command:
      - --housekeeping_interval=30s
      - --docker_only=true
      - --disable_metrics=percpu,sched,tcp,udp,disk,diskIO,hugetlb,referenced_memory,resctrl
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "${MONITORING_BIND_IP:-127.0.0.1}:8080:8080"
    networks:
      - monitoring
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/healthz",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 32M

  # ---- Alertmanager (optional, activate with profile) ----
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: on-failure
    logging: *default-logging
    profiles:
      - alerts
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-0}
    volumes:
      - ../monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "${MONITORING_BIND_IP:-127.0.0.1}:9093:9093"
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.1"
        reservations:
          memory: 32M

  # ---- Local webhook sink for alert delivery tests ----
  alert-webhook-sink:
    image: python:3.12-slim
    container_name: alert-webhook-sink
    restart: on-failure
    logging: *default-logging
    profiles:
      - alerts
    command: ["python", "/opt/webhook_sink.py"]
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ../monitoring/alertmanager/webhook_sink.py:/opt/webhook_sink.py:ro
    ports:
      - "${MONITORING_BIND_IP:-127.0.0.1}:19093:19093"
    networks:
      - monitoring
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:19093/healthz')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"
        reservations:
          memory: 32M

  # ==========================================
  # DESK SNAPSHOT SERVICE (INFRA-5)
  # Canonical read model: materializes one JSON
  # snapshot per bot from minute.csv, fills.csv,
  # open_orders, daily_state, and gate reports.
  # Telegram bot and metrics exporter read from here.
  # ==========================================
  desk-snapshot-service:
    <<: *control-plane-image
    container_name: desk-snapshot
    restart: on-failure
    logging: *default-logging
    volumes:
      - ../..:/workspace/hbot:ro
      - ../../reports:/workspace/hbot/reports
    command: /bin/bash -lc "python /workspace/hbot/services/desk_snapshot_service/main.py"
    environment:
      - PYTHONPATH=/workspace/hbot
      - PYTHONPYCACHEPREFIX=/tmp/pycache
      - HB_DATA_ROOT=/workspace/hbot/data
      - HB_REPORTS_ROOT=/workspace/hbot/reports
      - SNAPSHOT_POLL_INTERVAL_S=30
    networks:
      - trading
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,time,json; p='reports/desk_snapshot'; dirs=[d for d in os.listdir(p) if os.path.isdir(os.path.join(p,d))]; exit(0 if dirs and any(time.time()-os.path.getmtime(os.path.join(p,d,'latest.json'))<120 for d in dirs if os.path.exists(os.path.join(p,d,'latest.json'))) else 1)\""]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.05"
        reservations:
          memory: 32M

  # ==========================================
  # BOT WATCHDOG — monitors minute.csv freshness,
  # auto-restarts frozen bots with circuit breaker
  # and Telegram alerts. Replaces the shell watchdog.
  # ==========================================
  bot-watchdog:
    <<: *control-plane-image
    container_name: bot-watchdog
    restart: on-failure
    logging: *default-logging
    env_file:
      - ../env/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../..:/workspace/hbot:ro
    command: /bin/bash -lc "python /workspace/hbot/services/bot_watchdog/main.py"
    environment:
      - PYTHONPATH=/workspace/hbot
      - PYTHONPYCACHEPREFIX=/tmp/pycache
      - HB_DATA_ROOT=/workspace/hbot/data
      - WATCHDOG_BOTS=bot1,bot7
      - WATCHDOG_STALE_THRESHOLD_S=300
      - WATCHDOG_CHECK_INTERVAL_S=60
      - WATCHDOG_PAUSE_BEFORE_RESTART_S=120
      - WATCHDOG_MAX_RESTARTS=5
      - WATCHDOG_WINDOW_S=3600
      - WATCHDOG_SERVICE_RECOVERY_ENABLED=${WATCHDOG_SERVICE_RECOVERY_ENABLED:-false}
      - WATCHDOG_SERVICE_RECOVERY_INTERVAL_CHECKS=5
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-kzay_redis_paper_2026}
      - EXT_SIGNAL_RISK_ENABLED=${EXT_SIGNAL_RISK_ENABLED:-false}
      - WATCHDOG_CONTAINER_PREFIX=${WATCHDOG_CONTAINER_PREFIX:-}
      - WATCHDOG_STATE_FILE=/tmp/watchdog_state.json
    networks:
      - trading
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,time; exit(0 if time.time()-os.path.getmtime('/tmp/watchdog_heartbeat')<120 else 1)\""]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.1"
        reservations:
          memory: 64M

  test-runner:
    <<: *control-plane-image
    container_name: test-runner
    profiles:
      - test
    volumes:
      - ../..:/workspace/hbot
    environment:
      PYTHONPATH: /workspace/hbot
      PYTHONPYCACHEPREFIX: /tmp/pycache
    command: >
      /bin/sh -lc "python -m pytest /workspace/hbot/hbot/tests/ -x -q
      --ignore=/workspace/hbot/hbot/tests/integration"
    networks:
      - trading
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

